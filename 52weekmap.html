<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>52주 광고 맵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;background:#F5F4F0;color:#1C1B18;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

.app-header{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #E2E0DA;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;gap:12px}
.app-logo{display:flex;align-items:center;white-space:nowrap}
.app-logo svg{height:20px;width:auto}
.app-meta{font-size:14px;color:#666;margin-left:10px;padding-left:10px;border-left:1px solid #D3D1C7;font-weight:600;letter-spacing:-0.5px}
.header-right{display:flex;align-items:center;gap:10px}
.badge-week{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;background:#EAF3DE;color:#27500A;border:1px solid #C0DD97;font-weight:500}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid #D3D1C7;background:#fff;color:#444;transition:background .15s;white-space:nowrap;cursor:pointer}
.btn:hover{background:#F5F4F0}
.btn-admin{border-color:#378ADD;color:#185FA5;background:#EEF5FC}
.btn-admin.active{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary{background:#1C1B18;color:#fff;border-color:#1C1B18}
.btn-primary:hover{background:#333}
.btn-danger{color:#A32D2D;border-color:#E24B4A}
.btn-danger:hover{background:#FCEBEB}
.filter-btn.active{background:#1C1B18;color:#fff;border-color:#1C1B18}

.main{padding:16px 20px 40px}
.legend-bar{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}

.gantt-outer{display:flex;border:1px solid #E2E0DA;border-radius:10px;overflow:visible;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cat-col{flex-shrink:0;width:96px;border-right:1px solid #E2E0DA;background:#FAFAF8;z-index:30;border-radius:10px 0 0 10px;overflow:hidden}
.cat-col-spacer{height:80px;border-bottom:1px solid #E2E0DA;background:#FAFAF8}
.cat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid #E2E0DA;font-size:12px;font-weight:700;text-align:center;padding:8px 6px;gap:8px}
.cat-cell:last-child{border-bottom:none}

.timeline-area{flex:1;overflow-x:auto;overflow-y:visible;border-radius:0 10px 10px 0}
.timeline-inner{position:relative}

.header-row{display:flex;border-bottom:1px solid #E2E0DA;background:#FAFAF8}
.month-cell{flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#444;border-right:1px solid #E2E0DA;height:32px}
.week-cell{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #EEECEA;height:48px;position:relative;font-size:10px;color:#666;background:#FAFAF8}
.week-cell.cw{background:#EAF3DE}
.wn{font-weight:600;font-size:11px;color:#1C1B18;margin-bottom:1px;white-space:nowrap}
.wd{font-size:9px;color:#AAA}
.cwdot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#639922;z-index:5;border:1.5px solid #fff}

/* gantt-row: SVG data URI 격자선 */
.gantt-row{position:relative;border-bottom:1px solid #E2E0DA;background-color:#fff;background-repeat:no-repeat;background-size:4160px 100%;background-position:left top}
.gantt-row:last-child{border-bottom:none}
.cwcol{position:absolute;top:0;bottom:0;background:rgba(99,153,34,.05);pointer-events:none;z-index:1;border-left:2px solid rgba(99,153,34,.45)}

.pbar{
  position:absolute;z-index:5;border-radius:7px;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:row;align-items:stretch;border:1.5px solid transparent;
  transition:filter .15s,transform .1s,box-shadow .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.pbar:hover{filter:brightness(.92);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.pbar.admin-mode:hover{outline:2px dashed #378ADD;outline-offset:2px}
.pbar-info{flex:1;min-width:0;padding:0 10px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.pbar-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.pbar-range{font-size:10px;opacity:.6;margin-top:2px;white-space:nowrap}
.pbar-req{font-size:10px;margin-top:3px;font-weight:600;white-space:nowrap}
.pbar-thumb{flex-shrink:0;background-size:cover;background-position:center;background-repeat:no-repeat;border-left:1px solid rgba(0,0,0,.1);position:relative}
.kick-badge{position:absolute;top:5px;left:5px;background:#E8351A;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;letter-spacing:.3px;line-height:1.4;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.form-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #D3D1C7;border-radius:6px;background:#fff;cursor:pointer}
.form-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#E8351A}
.form-check-label{font-size:13px;color:#1C1B18;cursor:pointer;font-weight:500}

.detail-backdrop{position:fixed;inset:0;z-index:400;background:rgba(28,27,24,.4);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.detail-panel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;animation:slideUp .2s;box-shadow:0 -4px 32px rgba(0,0,0,.15)}
.dp-header{padding:18px 22px 14px;border-bottom:1px solid #E2E0DA;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.dp-title{font-size:15px;font-weight:700}
.dp-body{padding:18px 22px 28px}
.dp-img-wrap{width:100%;background:#F5F4F0;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:140px;margin-bottom:16px;border:1px solid #E2E0DA}
.dp-img{max-width:100%;max-height:420px;width:auto;height:auto;display:block;object-fit:contain}
.dp-img-placeholder{width:100%;padding:40px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#CCC;text-align:center}
.dp-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.dp-chip{font-size:11px;padding:4px 11px;border-radius:12px;border:1px solid #E2E0DA;background:#FAFAF8;color:#555}
.dp-chip.ok{border-color:#639922;background:#EAF3DE;color:#27500A;font-weight:600}

.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid #D3D1C7;border-radius:6px;font-size:13px;background:#fff;color:#1C1B18}
.form-input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.12)}
.form-input.input-error{border-color:#E24B4A !important;box-shadow:0 0 0 2px rgba(226,75,74,.15) !important;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.admin-toolbar{background:#EEF5FC;border-bottom:1px solid #C5DDEF;padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.admin-badge{font-size:11px;font-weight:600;color:#185FA5;background:#DBEEFB;padding:3px 10px;border-radius:12px;border:1px solid #B5D4F4}

.modal-backdrop{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:320px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:6px}
.modal p{font-size:12px;color:#666;margin-bottom:14px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>

<div class="modal-backdrop" id="admin-modal" style="display:none">
  <div class="modal">
    <h3>관리자 인증</h3>
    <p>비밀번호를 입력하세요</p>
    <input class="form-input" type="password" id="admin-pw" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')checkAdmin()"
      oninput="this.classList.remove('input-error');document.getElementById('admin-err').style.display='none'">
    <div class="btn-row" style="margin-top:12px">
      <button class="btn" onclick="document.getElementById('admin-modal').style.display='none'">취소</button>
      <button class="btn btn-primary" onclick="checkAdmin()">확인</button>
    </div>
    <div id="admin-err" style="font-size:11px;color:#A32D2D;margin-top:8px;display:none">비밀번호가 맞지 않습니다</div>
  </div>
</div>

<script>
/* ── 상수 ── */
const CW=13, CELL_W=80, LANE_H=100, BAR_H=88, BAR_TOP=6;

const MONTHS=[
  {name:'1월',start:1,end:5},{name:'2월',start:6,end:9},{name:'3월',start:10,end:13},
  {name:'4월',start:14,end:17},{name:'5월',start:18,end:22},{name:'6월',start:23,end:26},
  {name:'7월',start:27,end:31},{name:'8월',start:32,end:35},{name:'9월',start:36,end:39},
  {name:'10월',start:40,end:44},{name:'11월',start:45,end:48},{name:'12월',start:49,end:52},
];

const WD={
  1:'1/2',2:'1/9',3:'1/16',4:'1/23',5:'1/30',6:'2/6',7:'2/13',8:'2/20',9:'2/27',
  10:'3/6',11:'3/13',12:'3/20',13:'3/27',14:'4/3',15:'4/10',16:'4/17',17:'4/24',
  18:'5/1',19:'5/8',20:'5/15',21:'5/22',22:'5/29',23:'6/5',24:'6/12',25:'6/19',26:'6/26',
  27:'7/3',28:'7/10',29:'7/17',30:'7/24',31:'7/31',32:'8/7',33:'8/14',34:'8/21',35:'8/28',
  36:'9/4',37:'9/11',38:'9/18',39:'9/25',40:'10/2',41:'10/9',42:'10/16',43:'10/23',44:'10/30',
  45:'11/6',46:'11/13',47:'11/20',48:'11/27',49:'12/4',50:'12/11',51:'12/18',52:'12/25',
};

const ROWS=[
  {id:'marketing',label:'마케팅',bg:'#F8F7FE',border:'#7F77DD',text:'#3C3489'},
  {id:'chaeso',   label:'농산',  bg:'#EAF3DE',border:'#97C459',text:'#27500A'},
  {id:'susan',    label:'수산',  bg:'#E6F1FB',border:'#85B7EB',text:'#0C447C'},
  {id:'chuksan',  label:'축산',  bg:'#FAECE7',border:'#F0997B',text:'#712B13'},
  {id:'gongsan',  label:'공산',  bg:'#F1EFE8',border:'#B4B2A9',text:'#444441'},
];

/* ── 사전 계산 ── */

/* weekLabel: MONTHS 반복 탐색을 매 호출마다 하지 않도록 52개 미리 계산 */
const WEEK_LABELS = (() => {
  const arr = new Array(53);
  for(const m of MONTHS){
    for(let w=m.start; w<=m.end; w++) arr[w] = m.name+' '+(w-m.start+1)+'주';
  }
  return arr;
})();
function weekLabel(w){ return WEEK_LABELS[w] || 'W'+w; }

/* 주차 선택 옵션 HTML — 52개 option을 매 편집 오픈마다 재생성하지 않도록 캐시 */
const WEEK_OPTIONS_BASE = WEEK_LABELS.slice(1).map((lbl,i)=>`<option value="${i+1}">${lbl}</option>`).join('');
function getWeekOptions(sel){
  /* 선택된 주차만 selected 추가 — 전체 재생성 없이 문자열 치환 */
  return WEEK_OPTIONS_BASE.replace(`value="${sel}"`,`value="${sel}" selected`);
}

/* 요청 주차 표시 */
function reqLabel(sw){ const r=sw-1; return r>=1 ? weekLabel(r)+' ('+WD[r]+')' : '-'; }

/* 기간(주) → 썸네일 너비 조건부 계산 */
function thumbWidth(weeks){
  if(weeks<=1) return 40;
  if(weeks===2) return 80;
  if(weeks===3) return 100;
  if(weeks===4) return 160;
  if(weeks===5) return 240;
  return 320;
}

/* 격자선: SVG data URI — Chrome sub-pixel 이슈 없이 선명하게, 그라데이션 없음 */
const GRID_BG = (()=>{
  const totalW = 52 * CELL_W;
  const MS = new Set(MONTHS.map(m => (m.start - 1) * CELL_W));
  let lines = '';
  for(let w = 0; w < 52; w++){
    const x = w * CELL_W;
    const color = MS.has(x) ? '%23D3D1C7' : '%23EEECEA';
    lines += `<line x1='${x}' y1='0' x2='${x}' y2='100%25' stroke='${color}' stroke-width='1'/>`;
  }
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${totalW}' height='100%25'>${lines}</svg>`;
  return `url("data:image/svg+xml,${svg}")`;
})();

/* ── 데이터 ── */
let adminMode=false;
let activeFilter='all';
let segments=loadSegments();

function loadSegments(){
  try{
    const s=localStorage.getItem('kims_segs_2026_v5');
    if(s){
      const parsed=JSON.parse(s);
      /* 파싱된 데이터가 객체인지, 각 키가 배열인지 검증 */
      if(parsed && typeof parsed==='object' && !Array.isArray(parsed)){
        const valid={marketing:[],chaeso:[],susan:[],chuksan:[],gongsan:[]};
        for(const key of Object.keys(valid)){
          if(Array.isArray(parsed[key])){
            /* 각 세그먼트 필드 유효성 검사 */
            valid[key]=parsed[key].filter(seg=>
              seg && typeof seg==='object' &&
              typeof seg.id==='string' &&
              typeof seg.name==='string' && seg.name.trim()!=='' &&
              Number.isInteger(seg.start) && seg.start>=1 && seg.start<=52 &&
              Number.isInteger(seg.end)   && seg.end>=seg.start && seg.end<=52
            ).map(seg=>({
              id:   seg.id,
              name: seg.name.trim(),
              start:seg.start,
              end:  seg.end,
              kick: seg.kick===true,
              img:  (typeof seg.img==='string' && seg.img.startsWith('data:image/')) ? seg.img : null,
            }));
          }
        }
        return valid;
      }
    }
  }catch(e){ console.warn('세그먼트 로드 실패, 초기화:', e); }
  return {marketing:[],chaeso:[],susan:[],chuksan:[],gongsan:[]};
}

function saveSegments(){
  try{
    localStorage.setItem('kims_segs_2026_v5',JSON.stringify(segments));
  }catch(e){
    if(e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      alert('저장 용량이 초과되었습니다.\n이미지 용량이 너무 크거나 등록된 이미지가 너무 많습니다.\n일부 이미지를 삭제하거나 더 작은 이미지를 사용해 주세요.');
    } else {
      console.error('세그먼트 저장 실패:', e);
    }
  }
}

/* ── 레인 배정 ── */
function assignLanes(segs){
  if(!segs||segs.length===0) return 1;
  const sorted=[...segs].sort((a,b)=>(a.start||1)-(b.start||1));
  const ends=[];
  sorted.forEach(seg=>{
    let placed=false;
    for(let i=0;i<ends.length;i++){
      if(ends[i]<(seg.start||1)){ends[i]=seg.end||seg.start||1;seg._lane=i;placed=true;break;}
    }
    if(!placed){seg._lane=ends.length;ends.push(seg.end||seg.start||1);}
  });
  return ends.length||1;
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.filter===f);
  });
  render();
  /* 필터 변경 시 스크롤 위치 유지 */
  const ta=document.getElementById('timeline-area');
  if(ta){ const sx=ta.scrollLeft; requestAnimationFrame(()=>{ ta.scrollLeft=sx; }); }
}

/* ── 렌더 ── */
function render(){
  /* 마케팅은 항상 표시, 나머지는 필터 적용 */
  const visibleRows = ROWS.filter(r => r.id==='marketing' || activeFilter==='all' || activeFilter===r.id);

  /* 행 높이 사전 계산 */
  const rowMeta={};
  visibleRows.forEach(r=>{
    const segs=segments[r.id]||[];
    const lanes=assignLanes(segs);
    rowMeta[r.id]={segs,h:lanes*LANE_H+BAR_TOP*2};
  });

  const totalW=52*CELL_W;

  /* 좌측 카테고리 컬럼 */
  let ch=`<div class="cat-col-spacer"></div>`;
  visibleRows.forEach(r=>{
    ch+=`<div class="cat-cell" style="height:${rowMeta[r.id].h}px;background:${r.bg};color:${r.text}">
      <div>${r.label}</div>
      ${adminMode?`<button class="btn btn-admin" style="padding:2px 6px;font-size:10px" onclick="openAddSeg('${r.id}',event)">+ 추가</button>`:''}
    </div>`;
  });

  /* 타임라인 */
  const parts=[];
  parts.push(`<div style="width:${totalW}px">`);

  /* 월 헤더 */
  parts.push('<div class="header-row">');
  MONTHS.forEach(m=>{parts.push(`<div class="month-cell" style="width:${(m.end-m.start+1)*CELL_W}px">${m.name}</div>`);});
  parts.push('</div>');

  /* 주차 헤더 */
  parts.push('<div class="header-row">');
  for(let w=1;w<=52;w++){
    parts.push(`<div class="week-cell${w===CW?' cw':''}" style="width:${CELL_W}px"><div class="wn">${WEEK_LABELS[w]}</div><div class="wd">${WD[w]}</div>${w===CW?'<div class="cwdot"></div>':''}</div>`);
  }
  parts.push('</div>');

  /* 간트 행 */
  visibleRows.forEach(r=>{
    const {segs,h}=rowMeta[r.id];
    /* grid-bg를 CSS background-image로 적용 — wgl div 260개 제거 */
    parts.push(`<div class="gantt-row" style="height:${h}px;background-image:${GRID_BG}"><div class="cwcol" style="left:${(CW-1)*CELL_W}px;width:${CELL_W}px"></div>`);

    segs.forEach(seg=>{
      const weeks=seg.end-seg.start+1;
      const x=(seg.start-1)*CELL_W+4;
      const barW=weeks*CELL_W-8;
      const t=BAR_TOP+(seg._lane*LANE_H);
      const active=CW>=seg.start&&CW<=seg.end;
      const tw=thumbWidth(weeks);
      const thumbStyle=seg.img?`background-image:url('${seg.img}')`:`background:${r.border}22`;

      parts.push(`<div class="pbar${adminMode?' admin-mode':''}" onclick="onBarClick('${r.id}','${seg.id}')"
        style="left:${x}px;width:${barW}px;top:${t}px;height:${BAR_H}px;background:${r.bg};border-color:${active?r.border:r.border+'66'}">
        <div class="pbar-info">
          <div class="pbar-name" style="color:${r.text}">${escHtml(seg.name)}</div>
          <div class="pbar-range" style="color:${r.text}">${escHtml(WEEK_LABELS[seg.start]||'W'+seg.start)}~${escHtml(WEEK_LABELS[seg.end]||'W'+seg.end)}</div>
          ${seg.start>1?`<div class="pbar-req" style="color:${r.border}">요청 ${escHtml(WEEK_LABELS[seg.start-1]||'W'+(seg.start-1))}</div>`:''}
        </div>
        <div class="pbar-thumb" style="width:${tw}px;${thumbStyle}">${seg.kick?`<div class="kick-badge">킥셀링</div>`:''}</div>
      </div>`);
    });
    parts.push('</div>');
  });

  parts.push('</div>');
  const catCol=document.getElementById('cat-col');
  if(catCol) catCol.innerHTML=ch;
  const timelineInner=document.getElementById('timeline-inner');
  if(timelineInner) timelineInner.innerHTML=parts.join('');
}

/* ── 유틸 ── */
/* innerHTML에 사용자 입력값 삽입 시 XSS 방지 */
function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── 이벤트 핸들러 ── */
function onBarClick(rid,sid){ adminMode?openEdit(rid,sid):openDetail(rid,sid); }

function openDetail(rid,sid){
  const r=ROWS.find(x=>x.id===rid);
  const s=(segments[rid]||[]).find(x=>x.id===sid);
  if(!r||!s) return;
  document.getElementById('dp-title').textContent=r.label+' : '+s.name;
  document.getElementById('dp-body').innerHTML=`
    <div class="dp-img-wrap">${s.img
      ?`<img src="${s.img}" class="dp-img" alt="${escHtml(s.name)}">`
      :`<div class="dp-img-placeholder">이미지 없음</div>`}
    </div>
    <div class="dp-row">
      <div class="dp-chip ok">${escHtml(WEEK_LABELS[s.start]||'W'+s.start)}~${escHtml(WEEK_LABELS[s.end]||'W'+s.end)}</div>
      <div class="dp-chip">요청: ${reqLabel(s.start)}</div>
    </div>`;
  document.getElementById('detail-backdrop').style.display='flex';
}

function openEdit(rid,sid){
  const s=(segments[rid]||[]).find(x=>x.id===sid);
  if(!s) return;
  document.getElementById('dp-title').textContent='편집: '+s.name;
  document.getElementById('dp-body').innerHTML=`
    <div class="form-group"><label class="form-label">상품명</label><input class="form-input" id="e-name" value="${escHtml(s.name)}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">시작주</label><select class="form-input" id="e-start">${getWeekOptions(s.start)}</select></div>
      <div class="form-group"><label class="form-label">종료주</label><select class="form-input" id="e-end">${getWeekOptions(s.end)}</select></div>
    </div>
    <div class="form-group">
      <label class="form-label">옵션</label>
      <label class="form-check">
        <input type="checkbox" id="e-kick" ${s.kick?'checked':''}>
        <span class="form-check-label">킥셀링</span>
        <style="font-size:11px;color:#E8351A;background:#FEF0EE;border:1px solid #ffffff;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:700"</span>
        <span style="font-size:11px;color:#999;margin-left:4px">썸네일 좌상단에 마크 표시</span>
      </label>
    </div>
    <div class="form-group"><label class="form-label">이미지 변경</label><input type="file" class="form-input" accept="image/*" onchange="upImg(event,'${escHtml(rid)}','${escHtml(sid)}')"></div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="delSeg('${escHtml(rid)}','${escHtml(sid)}')">삭제</button>
      <button class="btn btn-primary" onclick="saveEdit('${escHtml(rid)}','${escHtml(sid)}')">저장</button>
    </div>`;
  document.getElementById('detail-backdrop').style.display='flex';
}

function openAddSeg(rid,e){
  e.stopPropagation();
  const row=ROWS.find(x=>x.id===rid);
  if(!row) return;
  document.getElementById('dp-title').textContent=row.label+' 새 구간 추가';
  document.getElementById('dp-body').innerHTML=`
    <div class="form-group"><label class="form-label">상품명</label><input class="form-input" id="e-name" placeholder="상품명 입력"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">시작주</label><select class="form-input" id="e-start">${getWeekOptions(CW)}</select></div>
      <div class="form-group"><label class="form-label">종료주</label><select class="form-input" id="e-end">${getWeekOptions(Math.min(CW+1,52))}</select></div>
    </div>
    <div class="form-group">
      <label class="form-label">옵션</label>
      <label class="form-check">
        <input type="checkbox" id="e-kick">
        <span class="form-check-label">킥셀링</span>
        <span style="font-size:11px;color:#E8351A;background:#FEF0EE;border:1px solid #F7C4BC;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:700">킥셀링</span>
        <span style="font-size:11px;color:#999;margin-left:4px">썸네일 좌상단에 마크 표시</span>
      </label>
    </div>
    <div class="form-group"><label class="form-label">이미지 (선택)</label><input type="file" class="form-input" id="e-img" accept="image/*"></div>
    <div class="btn-row">
      <button class="btn" onclick="closeDetail()">취소</button>
      <button class="btn btn-primary" onclick="addSeg('${rid}')">추가</button>
    </div>`;
  document.getElementById('detail-backdrop').style.display='flex';
}

function saveEdit(rid,sid){
  const s=(segments[rid]||[]).find(x=>x.id===sid);
  if(!s) return;
  s.name=document.getElementById('e-name').value||s.name;
  s.start=parseInt(document.getElementById('e-start').value)||1;
  s.end=Math.max(parseInt(document.getElementById('e-end').value)||1, s.start);
  const kickEl=document.getElementById('e-kick');
  if(kickEl) s.kick=kickEl.checked;
  saveSegments(); closeDetail(); render();
}

function addSeg(rid){
  const name=document.getElementById('e-name').value||'새 상품';
  const start=parseInt(document.getElementById('e-start').value)||1;
  const end=Math.max(parseInt(document.getElementById('e-end').value)||1, start);
  const kickEl=document.getElementById('e-kick');
  const kick=kickEl ? kickEl.checked : false;
  const fileInput=document.getElementById('e-img');
  const commit=(img)=>{
    (segments[rid]=segments[rid]||[]).push({id:Date.now().toString(),name,start,end,img,kick});
    saveSegments(); closeDetail(); render();
  };
  if(fileInput.files&&fileInput.files[0]){
    const reader=new FileReader();
    reader.onload=ev=>commit(ev.target.result);
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    commit(null);
  }
}

function delSeg(rid,sid){
  if(!confirm('삭제하시겠습니까?')) return;
  segments[rid]=(segments[rid]||[]).filter(x=>x.id!==sid);
  saveSegments(); closeDetail(); render();
}

function upImg(e,rid,sid){
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const seg=(segments[rid]||[]).find(x=>x.id===sid);
    if(seg) seg.img=ev.target.result;
    saveSegments(); render();
  };
  reader.readAsDataURL(f);
}

function toggleAdminPrompt(){
  if(adminMode){exitAdmin();return;}
  const pw=document.getElementById('admin-pw');
  const err=document.getElementById('admin-err');
  if(pw) pw.value='';
  if(err) err.style.display='none';
  document.getElementById('admin-modal').style.display='flex';
}
function checkAdmin(){
  const pw=document.getElementById('admin-pw');
  const err=document.getElementById('admin-err');
  if(pw&&pw.value==='admin1234'){
    if(pw) pw.classList.remove('input-error');
    enterAdmin();
  } else {
    if(err) err.style.display='block';
    if(pw){
      pw.classList.remove('input-error');
      /* reflow로 animation 재실행 */
      void pw.offsetWidth;
      pw.classList.add('input-error');
      pw.select();
    }
  }
}
function enterAdmin(){
  adminMode=true;
  document.getElementById('admin-modal').style.display='none';
  document.getElementById('admin-toolbar').style.display='flex';
  document.getElementById('admin-btn').classList.add('active');
  render();
}
function exitAdmin(){
  adminMode=false;
  document.getElementById('admin-toolbar').style.display='none';
  document.getElementById('admin-btn').classList.remove('active');
  render();
}

function scrollToCurrentWeek(){
  requestAnimationFrame(()=>{
    const ta=document.getElementById('timeline-area');
    if(ta) ta.scrollTo({left:Math.max(0,(CW-1)*CELL_W-100),behavior:'smooth'});
  });
}
function closeDetail(e){ if(!e||e.target.id==='detail-backdrop') document.getElementById('detail-backdrop').style.display='none'; }

render();
scrollToCurrentWeek();
</script>
</body>
</html>
